// lightwalletd gRPC service definition.
// Source: ECC lightwalletd / zcash/lightwalletd (Apache-2.0).
// Only the RPCs needed by nie-wallet are listed; others are omitted.
syntax = "proto3";
package cash.z.wallet.sdk.rpc;

import "compact_formats.proto";

// Identifies a block by height.  hash is ignored for all uses in nie-wallet.
message BlockID {
    uint64 height = 1;
    bytes  hash   = 2;
}

// Half-open range [start, end] of block heights.
message BlockRange {
    BlockID start = 1;
    BlockID end   = 2;
}

// Empty placeholder for parameterless requests.
message ChainSpec {}

// Raw transaction bytes for broadcast (SendTransaction RPC).
// height is the current chain tip at the time of broadcast; not all
// lightwalletd implementations check this field — set to 0 if unknown.
message RawTransaction {
    bytes  data   = 1;
    uint64 height = 2;
}

// Result of a SendTransaction RPC.
// Lightwalletd encodes success and failure in the same message:
//   error_code == 0: success; error_message contains the txid in lowercase hex.
//   error_code != 0: failure; error_message contains a human-readable reason.
message SendResponse {
    int32  error_code    = 1;
    string error_message = 2;
}

// CompactTxStreamer is the lightwalletd API surface used by nie-wallet.
service CompactTxStreamer {
    // Return the height of the current chain tip.
    rpc GetLatestBlock (ChainSpec) returns (BlockID);

    // Return a stream of consecutive compact blocks [start.height, end.height].
    rpc GetBlockRange (BlockRange) returns (stream CompactBlock);

    // Broadcast a raw transaction to the Zcash network.
    // On success, error_code = 0 and error_message = txid (64 lowercase hex chars).
    // On failure, error_code != 0 and error_message describes the rejection reason.
    rpc SendTransaction (RawTransaction) returns (SendResponse);
}
