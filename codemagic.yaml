workflows:
  android-debug:
    name: Android Debug APK
    max_build_duration: 30

    environment:
      flutter: stable

    scripts:
      - name: Build Android debug APK
        script: |
          flutter build apk --debug 2>&1; BUILD_RC=$?
          echo "=== APK search ==="
          find . -name "*.apk" 2>/dev/null || true
          exit $BUILD_RC

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

    publishing:
      email:
        recipients:
          - mark@example.com
        notify:
          success: true
          failure: true

  android-release:
    name: Android Release APK (unsigned)
    max_build_duration: 30

    environment:
      flutter: stable

    scripts:
      - name: Build Android release APK
        script: flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - mark@example.com
        notify:
          success: true
          failure: true
