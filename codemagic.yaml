workflows:
  android-debug:
    name: Android Debug APK
    max_build_duration: 90
    instance_type: linux_x2
    working_directory: flutter

    environment:
      flutter: stable
      vars:
        RUST_VERSION: "1.82.0"
        CARGO_NDK_VERSION: "3.5.4"
        FRB_VERSION: "2.7.0"
        # Codemagic provides ANDROID_SDK_ROOT and NDK automatically.

    scripts:
      - name: Install Rust toolchain
        script: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain "$RUST_VERSION" --no-modify-path
          source "$HOME/.cargo/env"
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android

      - name: Install cargo-ndk and flutter_rust_bridge_codegen
        script: |
          source "$HOME/.cargo/env"
          cargo install cargo-ndk --version "$CARGO_NDK_VERSION" --locked
          cargo install flutter_rust_bridge_codegen --version "$FRB_VERSION" --locked

      - name: Cross-compile nie-ffi for Android
        script: |
          source "$HOME/.cargo/env"
          cd "$CM_BUILD_DIR"
          cargo ndk \
            --target aarch64-linux-android \
            --target armv7-linux-androideabi \
            --target x86_64-linux-android \
            --output-dir flutter/android/app/src/main/jniLibs \
            build --release -p nie-ffi

      - name: Generate Dart FFI bindings
        script: |
          source "$HOME/.cargo/env"
          cd "$CM_BUILD_DIR"
          flutter_rust_bridge_codegen generate \
            --rust-input ffi/src/api \
            --dart-output flutter/lib/src/rust

      - name: Flutter pub get
        script: flutter pub get

      - name: Build Android debug APK
        script: flutter build apk --debug

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

    publishing:
      email:
        recipients:
          - mark@example.com
        notify:
          success: true
          failure: true

  android-release:
    name: Android Release APK (unsigned)
