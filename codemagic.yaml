          source "$HOME/.cargo/env"
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android

      - name: Install cargo-ndk and flutter_rust_bridge_codegen
        script: |
          source "$HOME/.cargo/env"
