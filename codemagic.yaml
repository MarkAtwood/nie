workflows:
  android-debug:
    name: Android Debug APK
    max_build_duration: 30

    environment:
      flutter: stable

    scripts:
      - name: Build Android debug APK
        script: |
          flutter build apk --debug 2>&1 || true
          APK="android/app/build/outputs/flutter-apk/app-debug.apk"
          if [ -f "$APK" ]; then
            echo "APK ready: $APK"
          else
            echo "ERROR: APK not found at $APK"
            find . -name "*.apk" 2>/dev/null || true
            exit 1
          fi

    artifacts:
      - android/app/build/outputs/flutter-apk/app-debug.apk

    publishing:
      email:
        recipients:
          - mark@example.com
        notify:
          success: true
          failure: true

  android-release:
    name: Android Release APK (unsigned)
    max_build_duration: 30

    environment:
      flutter: stable

    scripts:
      - name: Build Android release APK
        script: |
          flutter build apk --release 2>&1 || true
          APK="android/app/build/outputs/flutter-apk/app-release.apk"
          if [ -f "$APK" ]; then
            echo "APK ready: $APK"
          else
            echo "ERROR: APK not found at $APK"
            find . -name "*.apk" 2>/dev/null || true
            exit 1
          fi

    artifacts:
      - android/app/build/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - mark@example.com
        notify:
          success: true
          failure: true
