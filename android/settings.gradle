pluginManagement {
    def flutterSdkPath = {
        def props = new Properties()
        def lp = file("local.properties")
        if (lp.exists()) lp.withInputStream { props.load(it) }
        def sdk = props.getProperty("flutter.sdk") ?: System.getenv("FLUTTER_ROOT")
        assert sdk != null, "flutter.sdk not set in local.properties and FLUTTER_ROOT env var not set"
        return sdk
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.6.0" apply false
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false
}

include ":app"
