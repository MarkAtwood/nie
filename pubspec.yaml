name: nie
description: Encrypted relay chat with privacy coin payments.
version: 1.0.0+1
publish_to: "none"

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  # Ed25519 key generation and signing
  cryptography: ^2.7.0
  # SHA-256 for pub_id derivation
  crypto: ^3.0.3
  # WebSocket relay connection
  web_socket_channel: ^3.0.1
  # Identity seed + relay URL storage
  shared_preferences: ^2.2.3
  # State management
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
